# Configuracion del Servidor de Testeo de Objetos (Python)

# Donde esta el Servidor de Pesos (Java) del que se descarga el modelo
weights.server.host=127.0.0.1
weights.server.port=6100

# Donde se guarda localmente una copia del modelo descargado
modelo.cache.path=modelo/pesos_modelo.bin

# Donde se guardan las imagenes de los objetos detectados
capturas.dir=capturas

# Confianza minima (0.0 a 1.0) para aceptar una deteccion
confianza.minima=0.5

# Archivo con las direcciones del cluster Raft (compartido con Java y C++)
cluster.config.path=config/cluster.properties

# Camaras IP (minimo 3, segun el enunciado). host/puerto de cada una.
camara.1.id=1
camara.1.host=127.0.0.1
camara.1.port=7101

camara.2.id=2
camara.2.host=127.0.0.1
camara.2.port=7102

camara.3.id=3
camara.3.host=127.0.0.1
camara.3.port=7103
