# Configuracion para la PRUEBA LOCAL end-to-end (todo en localhost):
# WeightsServer de Java + nodos Raft + camaras simuladas + este Servidor de
# Testeo, todos en la misma maquina, solo para validar que el pipeline
# completo funciona antes de desplegar en la LAN real.

weights.server.host=127.0.0.1
weights.server.port=6100

modelo.cache.path=modelo/pesos_modelo_cache.bin
capturas.dir=capturas
confianza.minima=0.3

# Usar el cluster de prueba local (3 nodos Raft en localhost, ver
# cluster-local-test.properties) en vez del cluster real de la LAN.
cluster.config.path=config/cluster-local-test.properties

camara.1.id=1
camara.1.host=127.0.0.1
camara.1.port=7101

camara.2.id=2
camara.2.host=127.0.0.1
camara.2.port=7102

camara.3.id=3
camara.3.host=127.0.0.1
camara.3.port=7103
