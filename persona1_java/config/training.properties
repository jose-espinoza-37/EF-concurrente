# Configuracion del Servidor de Entrenamiento de IA (Java)

# Carpeta raiz del dataset (una subcarpeta por clase, ej: dataset/persona, dataset/perro, ...)
dataset.path=dataset

# Tamano al que se redimensiona cada imagen antes de extraer features
image.width=32
image.height=32

# Hiperparametros de la red neuronal
hidden.size=128
learning.rate=0.05
epochs=600

# Numero de hilos para paralelizar el calculo de gradientes por epoca.
batch.threads=4

# Donde se persisten los pesos entrenados
model.output.path=modelo/pesos_modelo.bin

# Puerto en el que el WeightsServer expone el modelo para el Servidor de Testeo (Python)
weights.server.port=6100

# ---------------------------------------------------------------------
# NUEVO: mejoras al entrenamiento (no cambian el formato del archivo)
# ---------------------------------------------------------------------

# Data augmentation: genera variantes (espejo, brillo, zoom leve) de cada
# imagen REAL para multiplicar el dataset efectivo. No se aplica a las
# imagenes sinteticas generadas automaticamente cuando una carpeta esta vacia.
augmentation.enabled=true
augmentation.variants=4

# Momentum del descenso de gradiente (0 = SGD clasico sin momentum).
momentum=0.9

# Regularizacion L2 (weight decay), reduce sobreajuste.
l2.regularization=0.0005

# Decaimiento del learning rate: se multiplica por este factor cada
# "learning.rate.decay.every" epocas (0 = desactivar el decay).
learning.rate.decay=0.95
learning.rate.decay.every=20

# ---------------------------------------------------------------------
# NUEVO: validacion honesta + early stopping (no cambian el formato del archivo)
# ---------------------------------------------------------------------

# Fraccion de cada clase reservada para VALIDACION (nunca se entrena con
# estas imagenes, ni siquiera sus variantes aumentadas). 0.0 = desactivar.
validation.split=0.15

# Cada cuantas epocas se evalua contra el set de validacion.
validate.every=5

# Si esta activo, para el entrenamiento si la validacion no mejora durante
# "early.stopping.patience" evaluaciones seguidas (para no sobreajustar
# ni perder tiempo entrenando de mas).
early.stopping.enabled=true
early.stopping.patience=10