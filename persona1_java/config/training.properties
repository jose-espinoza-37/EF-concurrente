# Configuracion del Servidor de Entrenamiento de IA (Java)

# Carpeta raiz del dataset (una subcarpeta por clase, ej: dataset/persona, dataset/perro, ...)
dataset.path=dataset

# Tamano al que se redimensiona cada imagen antes de extraer features
image.width=32
image.height=32

# Hiperparametros de la red neuronal
hidden.size=64
learning.rate=0.05
epochs=200

# Numero de hilos para paralelizar el calculo de gradientes por epoca.
# Por defecto usa todos los nucleos disponibles de la maquina.
batch.threads=4

# Donde se persisten los pesos entrenados
model.output.path=modelo/pesos_modelo.bin

# Puerto en el que el WeightsServer expone el modelo para el Servidor de Testeo (Python)
weights.server.port=6100
