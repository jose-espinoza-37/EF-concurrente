# Configuracion del cluster Raft HETEROGENEO (Java + Python + C++).
# IMPORTANTE: este archivo debe ser IDENTICO (mismos ids, hosts y puertos)
# en las 3 maquinas/lenguajes para que el consenso funcione.
#
# Reemplazar los valores de "host" por las IPs reales de cada maquina
# dentro de la LAN/WIFI el dia del despliegue.

cluster.nodes=java1,python1,cpp1

# Persona 1 - Nodo Raft en Java (Ubuntu)
node.java1.host=192.168.1.10
node.java1.port=6001

# Persona 2 - Nodo Raft en Python (Windows)
node.python1.host=192.168.1.20
node.python1.port=6002

# Persona 3 - Nodo Raft en C++ (Ubuntu)
node.cpp1.host=192.168.1.10
node.cpp1.port=6003
